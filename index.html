   <span>tap any node to isolate its flows</span>
  </div>
  <div style={{marginTop:22,background:"var(--surface)",border:"1px solid var(--line)",borderRadius:12,overflow:"hidden"}}>
   <div style={{display:"flex",borderBottom:"1px solid var(--line)"}}>
    <Tab on={tab==="unreg"} onClick={()=>setTab("unreg")}>Unregistered \u2014 name before close</Tab>
    <Tab on={tab==="resolved"} onClick={()=>setTab("resolved")}>Partials resolved by chain</Tab>
   </div>
   <div style={{padding:"6px 4px"}}>
    {tab==="unreg"&&DATA.val.map((r,i)=><Row key={i} addr={r.a} right={r.in>0?"received "+fmtK(r.in):"sent "+fmtK(r.o)} dir={r.in>0?"in":"out"}/>)}
    {tab==="resolved"&&DATA.resolved.map((r,i)=><Row key={i} addr={r.addr} right={fmtK(r.v)+" matched"} dir="ok"/>)}
   </div>
  </div>
  <div style={{fontSize:11.5,color:"var(--muted)",marginTop:10,padding:"0 2px",lineHeight:1.5}}>Scam tokens posing as USDC and address-poisoning dust were stripped before mapping. Four register entries flagged as partial addresses were resolved by actual transfers. Two large unregistered flows (a $650k inbound source and a $433k outbound destination) are not in the register at all.</div>
 </div>);
}
function Kpi({label,v,c,sub,alert}){return <div style={{background:"var(--surface)",border:"1px solid "+(alert?"#e8cf9a":"var(--line)"),borderRadius:10,padding:"13px 15px"}}>
 <div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
 <div className="num" style={{fontSize:23,fontWeight:600,color:c,marginTop:5}}>{v}</div>
 <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{sub}</div></div>;}
function Leg({c,sq,children}){return <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:11,height:11,background:sq?c:"#fff",border:"2px solid "+c,borderRadius:sq?2:11,display:"inline-block"}}/>{children}</span>;}
function Tab({on,onClick,children}){return <div className="tab" onClick={onClick} style={{padding:"11px 14px",fontSize:13,fontWeight:on?600:450,color:on?"var(--ink)":"var(--muted)",borderBottom:on?"2px solid var(--owned)":"2px solid transparent",marginBottom:-1}}>{children}</div>;}
function Row({addr,right,dir}){const col=dir==="in"?"var(--reg)":dir==="out"?"var(--unreg)":"var(--owned)";
 return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid var(--line)"}}>
  <span className="mono" style={{fontSize:12.5}}>{short(addr)}<span style={{color:"var(--muted)",fontSize:11,marginLeft:8}}>{addr.slice(0,12)}\u2026</span></span>
  <span className="num" style={{fontSize:12.5,fontWeight:600,color:col}}>{right}</span></div>;}
ReactDOM.createRoot(document.getElementById("root")).render(<FlowMap/>);
</script></body></html>
