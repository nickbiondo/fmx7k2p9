function App(){

  const INT=new Set(["owned","personal","held","treasury"]);
  const internal=M.mapnodes.filter(n=>INT.has(n.tag));
  const sources=M.mapnodes.filter(n=>!INT.has(n.tag)&&n.out>n["in"]);
  const dests=M.mapnodes.filter(n=>!INT.has(n.tag)&&n.out<=n["in"]);
  const W=1040,colN=Math.max(internal.length,sources.length,dests.length),gap=56,top=64,H=top+colN*gap+26;
  const place=(arr,x)=>{const s=[...arr].sort((a,b)=>(b["in"]+b.out)-(a["in"]+a.out));const colH=s.length*gap,y0=top+(colN*gap-colH)/2+gap/2;const mm={};s.forEach((n,i)=>mm[n.a]={...n,x,y:y0+i*gap});return mm;};

 const maxV=Math.max(...M.mapedges.map(e=>e.v));

 const eDash=(k)=>k==="treasury"?"1 5":(k==="internal"?"3 4":"0");

 const eColor=(e)=>(isTre(e.f)||isTre(e.t))?"var(--treasury)":((isUnk(e.f)||isUnk(e.t))?"var(--unreg)":"var(--reg)");
 const eDashE=(e)=>(isTre(e.f)||isTre(e.t))?"1 5":((layout.internalIds.has(e.f)&&layout.internalIds.has(e.t))?"3 4":"0");

   <Pill c="var(--held)" label="Held" v={M.counts.held}/>
   <div style={{flex:1}}/>
   <button onClick={exportCsv} style={{background:"var(--owned)",color:"#fff",border:"none",borderRadius:7,padding:"8px 14px",fontSize:13,fontWeight:600}}>Export register CSV</button>
  </div>

  <div className="cols">
   <div className="colA">
    <div ref={mapRef} className="sc" style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:12,overflow:"auto",padding:"4px 6px"}} onClick={()=>setSel(null)}>
     <svg viewBox={"0 0 "+layout.W+" "+layout.H} style={{width:"100%",minWidth:720,height:"auto",display:"block"}}>
      <text x={150} y={30} textAnchor="middle" fontSize="10.5" fontWeight="600" fill="var(--muted)">CAPITAL / INFLOW →</text>
      <text x={layout.W/2} y={30} textAnchor="middle" fontSize="10.5" fontWeight="600" fill="var(--owned)">KNOWN SET (ours)</text>
      <text x={layout.W-150} y={30} textAnchor="middle" fontSize="10.5" fontWeight="600" fill="var(--muted)">→ PAYMENTS / OUTFLOW</text>
      {viewEdges.map((e,i)=>{const d=path(e);if(!d)return null;const on=!sel||conn(e);
       return <path key={i} d={d} fill="none" stroke={eColor(e)} strokeWidth={sw(e.v)} strokeOpacity={on?(sel?0.7:eOpac(e)):0.05} strokeDasharray={eDashE(e)} strokeLinecap="round"/>;})}
      {M.mapnodes.map(n=>{const p=layout.pos[n.a];if(!p)return null;const isInt=layout.internalIds.has(n.a);const on=nodeOn(n.a);
       const nm=rname(n.a); const isUnknown=isUnk(n.a); const labelLeft=p.x>layout.W/2; const disp=nm?trunc(nm,18):short(n.a);
       return (<g key={n.a} opacity={(on&&monOn(n.a))?1:0.16} style={{cursor:"pointer"}}
         onMouseEnter={(ev)=>{setHover(n.a);setPos({x:ev.clientX,y:ev.clientY});}}
         onMouseMove={(ev)=>setPos({x:ev.clientX,y:ev.clientY})} onMouseLeave={()=>setHover(null)}
         onClick={(ev)=>{ev.stopPropagation();setSel(sel===n.a?null:n.a);const t=byA[n.a]&&byA[n.a].status;if(t)setTab(t);}}>
        {sel===n.a&&<circle cx={p.x} cy={p.y} r={16} fill="none" stroke="#111" strokeWidth={2} strokeDasharray="3 3" opacity={0.75}/>}
        {isInt?<rect x={p.x-8} y={p.y-8} width={16} height={16} rx={4} fill={nodeColor(n)} stroke={sel===n.a?"#111":"none"} strokeWidth={2}/>
         :<circle cx={p.x} cy={p.y} r={7} fill="#fff" stroke={nodeColor(n)} strokeWidth={2.4} strokeDasharray={isUnknown?"2 2":"0"}/>}
        <text x={isInt?p.x:(labelLeft?p.x+12:p.x-12)} y={isInt?p.y-13:p.y+3.5} textAnchor={isInt?"middle":(labelLeft?"start":"end")}
          fontFamily={nm?"IBM Plex Sans":"IBM Plex Mono"} fontSize="9.5" fill={isUnknown?"var(--unreg)":(n.tag==="treasury"?"var(--treasury)":"var(--ink)")} fontWeight={isUnknown?600:(isInt?500:400)}>{disp}</text>
       </g>);})}
     </svg>
    </div>
    <TimeBar months={M.months} monthly={M.monthly} mon={mon} setMon={setMon} playing={playing} setPlaying={setPlaying}/>
    <div style={{display:"flex",gap:13,flexWrap:"wrap",margin:"10px 2px 0",fontSize:11,color:"var(--muted)"}}>
     <Leg c="var(--reg)" sq>known (ours)</Leg><Leg c="var(--reg)">known party</Leg><Leg c="var(--treasury)" sq>treasury (excl.)</Leg><Leg c="var(--unreg)">unknown</Leg>
     <span style={{color:"var(--reg)"}}>green line = both ends known</span><span style={{color:"var(--unreg)"}}>amber line = one end unknown</span>
    </div>
   </div>

   <div className="colB">
    <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:12,overflow:"hidden"}}>
     <div style={{display:"flex",borderBottom:"1px solid var(--line)"}}>
      <QTab on={tab==="name"} onClick={()=>setTab("name")}>Name ({remainName})</QTab>
      <QTab on={tab==="id"} onClick={()=>setTab("id")}>Confirm ({M.counts.id})</QTab>
      <QTab on={tab==="treasury"} onClick={()=>setTab("treasury")}>Treasury ({M.counts.treasury})</QTab>
      <QTab on={tab==="held"} onClick={()=>setTab("held")}>Held ({M.counts.held})</QTab>
     </div>
     <div className="sc" style={{maxHeight:560,overflowY:"auto"}}>
      {queue.sort((a,b)=>(b["in"]+b.out)-(a["in"]+a.out)).map(n=>(
       <QRow key={n.a} n={n} rname={rname} confirmed={confirmed} sel={sel} onSelect={()=>setSel(sel===n.a?null:n.a)} onName={setName} onConfirm={toggleConfirm}/>))}
      {queue.length===0&&<div style={{padding:24,textAlign:"center",color:"var(--muted)",fontSize:13}}>Nothing here.</div>}
     </div>
    </div>
   </div>
  </div>

  {tipNode&&<div className="tip" style={{left:Math.min(pos.x+14,window.innerWidth-290),top:pos.y+14}}>
   <div style={{fontWeight:600,fontSize:12.5,marginBottom:2}}>{rname(tipNode.a)||"UNIDENTIFIED — needs a name"}</div>
   <div className="mono" style={{color:"#aab",fontSize:10,marginBottom:5}}>{short(tipNode.a)} · {tipNode.entity||tipNode.tag}</div>
   <div style={{fontSize:11,marginBottom:6,color:"#dde"}}>in <b style={{color:"#7ddca0"}}>{fmtK(tipNode["in"])}</b> · out <b style={{color:"#e6b06f"}}>{fmtK(tipNode.out)}</b></div>
   {tipNode.mv.slice(0,5).map((x,i)=>(<div key={i} style={{fontSize:10.5,display:"flex",justifyContent:"space-between",gap:10,color:"#ccd"}}><span>{x.d==="in"?"← from ":"→ to "}{trunc(x.cn||x.c,20)}</span><span className="num">{fmtK(x.v)}</span></div>))}
  </div>}
 </div>);
}
function TimeBar({months,monthly,mon,setMon,playing,setPlaying}){
 const W=1040,H=132,padT=14,padB=22,padL=10,padR=10,innerH=H-padT-padB;
 const max=Math.max(1,...months.map(m=>{const d=monthly[m]||{};return Math.max(d.in||0,d.internal||0,d.out||0);}));
 const cw=(W-padL-padR)/months.length, bw=Math.min(13,cw/3.6);
 const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
 const lbl=(m)=>{const p=m.split("-");return MN[parseInt(p[1])-1];};
 const cols=[["in","var(--reg)"],["internal","var(--internal)"],["out","var(--unreg)"]];
 return (<div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:12,padding:"10px 12px",marginTop:12}}>
  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4,flexWrap:"wrap"}}>
   <span style={{fontSize:10.5,fontWeight:600,color:"var(--muted)",letterSpacing:".04em"}}>MOVEMENT BY MONTH</span>
   <span style={{fontSize:10.5,color:"var(--reg)"}}>\u25cf capital in</span>
   <span style={{fontSize:10.5,color:"var(--internal)"}}>\u25cf internal</span>
   <span style={{fontSize:10.5,color:"var(--unreg)"}}>\u25cf out</span>
   <div style={{flex:1}}/>
   <span style={{fontSize:12,fontWeight:600,color:"var(--ink)"}}>{mon<0?"All months":lbl(months[mon])+" "+months[mon].slice(0,4)}</span>
   <button onClick={()=>{setPlaying(false);setMon(-1);}} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"1px solid var(--line2)",background:mon<0?"var(--owned)":"#fff",color:mon<0?"#fff":"var(--ink)",fontWeight:600}}>All</button>
   <button onClick={()=>setPlaying(p=>!p)} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"none",background:"var(--owned)",color:"#fff",fontWeight:600}}>{playing?"\u275a\u275a Pause":"\u25b6 Play"}</button>
  </div>
  <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
   {months.map((m,i)=>{const d=monthly[m]||{};const x0=padL+i*cw;const sel=i===mon;
     return (<g key={m} style={{cursor:"pointer"}} onClick={()=>{setPlaying(false);setMon(sel?-1:i);}}>
       {sel&&<rect x={x0} y={padT-6} width={cw} height={innerH+padB+4} fill="#EDF1F6" rx={5}/>}
       {cols.map(([k,c],j)=>{const v=d[k]||0;const h=v/max*innerH;const bx=x0+cw/2-bw*1.5-1+j*(bw+1);
         return <rect key={k} x={bx} y={padT+innerH-h} width={bw} height={h} fill={c} rx={1.5} opacity={(mon<0||sel)?1:0.3}/>;})}
       <text x={x0+cw/2} y={H-7} textAnchor="middle" fontSize="8.5" fill={sel?"var(--ink)":"var(--muted)"} fontWeight={sel?600:400}>{lbl(m)}</text>
     </g>);})}
  </svg>
 </div>);
}
function QRow({n,rname,confirmed,sel,onSelect,onName,onConfirm}){
 const nm=rname(n.a); const done=confirmed(n.a); const need=n.status==="name"; const treas=n.status==="treasury";
 return (<div className="row" style={{padding:"11px 13px",borderBottom:"1px solid var(--line)",background:sel===n.a?"#EDF1F6":(done?"#f4f8f4":"transparent")}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,cursor:"pointer"}} onClick={onSelect}>
   <span className="mono" style={{fontSize:11.5,color:"var(--muted)"}}>{short(n.a)}{treas&&<span style={{marginLeft:7,fontSize:9.5,color:"var(--treasury)",border:"1px solid var(--treasury)",borderRadius:4,padding:"1px 4px"}}>excl.</span>}</span>
   <span className="num" style={{fontSize:11.5}}>{n["in"]>0&&<span style={{color:"var(--reg)"}}>+{fmtK(n["in"])} </span>}{n.out>0&&<span style={{color:"var(--unreg)"}}>-{fmtK(n.out)}</span>}</span>
  </div>
  {need?(
   <div style={{marginTop:7}}>
    <div className="mono" style={{fontSize:10.5,wordBreak:"break-all",color:"var(--ink)",marginBottom:6,background:"#f3f1ea",borderRadius:5,padding:"5px 7px"}}>{n.a} <a href={"https://eth.blockscout.com/address/"+n.a} target="_blank" rel="noreferrer" style={{color:"var(--owned)",textDecoration:"none",fontWeight:600}}>↗ explorer</a></div>
    {n.sug&&n.sug.ded?<div style={{fontSize:11,background:"#FBF7EC",border:"1px solid #ecdcb4",borderRadius:6,padding:"7px 9px",marginBottom:6,color:"#6b5a2e",lineHeight:1.45}}><b>Suggestion:</b> {n.sug.ded}{n.sug.facts?<span style={{color:"#9a8a5e"}}> — {n.sug.facts}</span>:null}</div>:null}
    <div style={{display:"flex",gap:6}}>
     <input value={nm} placeholder="who/what is this?" onChange={e=>onName(n.a,e.target.value)} style={{flex:1,fontSize:12.5,padding:"6px 8px",border:"1px solid var(--line2)",borderRadius:6,outline:"none"}}/>
     <button onClick={()=>onConfirm(n.a)} disabled={!nm} style={{fontSize:12,padding:"6px 12px",borderRadius:6,border:"none",background:done?"var(--reg)":(nm?"var(--owned)":"var(--line2)"),color:"#fff",opacity:nm?1:0.6}}>{done?"✓ saved":"save"}</button>
    </div>
   </div>
  ):(
   <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:5,gap:8}}>
    <span style={{fontSize:13,fontWeight:500}}>{nm||short(n.a)}{n.note?<span style={{color:"var(--muted)",fontWeight:400,fontSize:11.5}}> · {trunc(n.note,40)}</span>:null}</span>
    <button onClick={()=>onConfirm(n.a)} style={{fontSize:12,padding:"5px 10px",borderRadius:6,whiteSpace:"nowrap",border:"1px solid "+(done?"var(--reg)":"var(--line2)"),background:done?"var(--reg)":"#fff",color:done?"#fff":"var(--ink)"}}>{done?"✓":"confirm"}</button>
   </div>
  )}
 </div>);
}
function Stat({label,v,c,sub}){return <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:9,padding:"10px 13px"}}>
 <div style={{fontSize:10.5,color:"var(--muted)",textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
 <div className="num" style={{fontSize:19,fontWeight:600,color:c,marginTop:3}}>{v}</div>
 {sub&&<div style={{fontSize:10,color:"var(--muted)",marginTop:1}}>{sub}</div>}</div>;}
function Pill({c,label,v}){return <div style={{display:"flex",alignItems:"center",gap:7,background:"var(--surface)",border:"1px solid var(--line)",borderRadius:8,padding:"7px 12px"}}>
 <span style={{width:9,height:9,borderRadius:9,background:c,display:"inline-block"}}/><span style={{fontSize:12,color:"var(--muted)"}}>{label}</span><span className="num" style={{fontSize:13,fontWeight:600}}>{v}</span></div>;}
function Leg({c,sq,children}){return <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,background:sq?c:"#fff",border:"2px solid "+c,borderRadius:sq?2:10,display:"inline-block"}}/>{children}</span>;}
function QTab({on,onClick,children}){return <div onClick={onClick} style={{flex:1,textAlign:"center",padding:"11px 4px",fontSize:12,fontWeight:on?600:450,color:on?"var(--ink)":"var(--muted)",borderBottom:on?"2px solid var(--owned)":"2px solid transparent",cursor:"pointer"}}>{children}</div>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
